<!DOCTYPE html>
<html>
<head>
    <title>WSN Dashboard v3</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: #161b22;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            border-right: 2px solid #30363d;
        }

        #sidebar h2 {
            margin-top: 0;
            color: #58a6ff;
        }

        .menu-section {
            margin-top: 20px;
        }

        .dropdown {
            background: #21262d;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .dropdown:hover {
            background: #30363d;
        }

        .dropdown-content {
            display: none;
            padding-left: 15px;
            margin-top: 10px;
        }

        .dropdown-content button {
            width: 100%;
            margin-bottom: 8px;
            padding: 8px;
            background: #238636;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }

        .dropdown-content button:hover {
            background: #2ea043;
        }

        /* MAIN PANEL */
        #main {
            flex: 1;
            padding: 20px;
        }

        #panel-title {
            font-size: 28px;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        #output-box {
            background: #161b22;
            border: 2px solid #30363d;
            padding: 15px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* STATUS BAR */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 260px;
            right: 0;
            background: #161b22;
            padding: 10px;
            border-top: 2px solid #30363d;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>WSN Dashboard v3</h2>

        <div class="menu-section">
            <div class="dropdown" onclick="toggleDropdown('sys')">⚙ System</div>
            <div id="sys" class="dropdown-content">
                <button onclick="sendAction('ping')">Ping</button>
                <button onclick="sendAction('status')">Status</button>
                <button onclick="sendAction('restart')">Restart</button>
            </div>
        </div>

        <div class="menu-section">
            <div class="dropdown" onclick="toggleDropdown('fw')">📁 FileWatcher</div>
            <div id="fw" class="dropdown-content">
                <button onclick="sendAction('scan')">Scan Folder</button>
                <button onclick="sendAction('fw_info')">Info</button>
                <button onclick="sendAction('fw_refresh')">Refresh</button>
            </div>
        </div>

        <div class="menu-section">
            <div class="dropdown" onclick="toggleDropdown('tools')">🧰 Tools</div>
            <div id="tools" class="dropdown-content">
                <button onclick="sendAction('logs')">View Logs</button>
                <button onclick="sendAction('clear')">Clear Output</button>
                <button onclick="sendAction('theme')">Switch Theme</button>
            </div>
        </div>

    </div>

    <!-- MAIN PANEL -->
    <div id="main">
        <div id="panel-title">Dashboard Output</div>
        <div id="output-box">Waiting for commands...</div>
    </div>

    <!-- STATUS BAR -->
    <div id="status-bar">
        Connected to WSN Node • Dashboard v3
    </div>

<script>
    function toggleDropdown(id) {
        let box = document.getElementById(id);
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    function sendAction(action) {
        document.getElementById("output-box").innerText += "\n> Sent action: " + action;

        fetch("YOUR_WEBHOOK_URL_HERE", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: `WSN Dashboard Command\nAction: ${action}\nUID: web\nTS: ${Date.now()}\nAuth: WSN`
            })
        });
    }
</script>

</body>
</html>
