<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WSN Remote Dashboard</title>

    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        .panel {
            background: #161b22;
            padding: 25px;
            width: 500px;
            margin: auto;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        button {
            background: #238636;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }
        button:hover {
            background: #2ea043;
        }
    </style>
</head>

<body>

<div class="panel">
    <h1>❄️ WSN Remote Dashboard</h1>
    <p id="status">Loading session…</p>

    <button onclick="sendPing()">Send Dashboard Ping</button>
</div>

<script>
    // Read URL parameters
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");
    const ts = params.get("ts");
    const auth = params.get("auth");

    // Display session info
    document.getElementById("status").innerText =
        `Connected as UID ${uid}\nTimestamp ${ts}\nAuth ${auth}`;

    // Send command to your backend
    function sendPing() {
        fetch("https://your-server-endpoint-here.com/wsn", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                uid: uid,
                timestamp: ts,
                auth: auth,
                action: "dashboard_ping"
            })
        })
        .then(res => res.text())
        .then(data => alert("Server Response:\n" + data))
        .catch(err => alert("Error:\n" + err));
    }
</script>

</body>
</html>
