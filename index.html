<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WSN Remote Dashboard</title>

    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        .panel {
            background: #161b22;
            padding: 25px;
            width: 500px;
            margin: auto;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .info {
            white-space: pre-line;
            margin-top: 15px;
            font-size: 15px;
            color: #8b949e;
        }
    </style>
</head>

<body>

<div class="panel">
    <h1>❄️ WSN Remote Dashboard</h1>
    <p class="info" id="session">Loading session…</p>
</div>

<script>
    // Read URL parameters
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");
    const ts = params.get("ts");
    const auth = params.get("auth");

    // Display session info
    document.getElementById("session").innerText =
        `User ID: ${uid}\nTimestamp: ${ts}\nAuth Token: ${auth}\n\nDashboard is online.`;
</script>

</body>
</html>
