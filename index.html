<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>❄️ WSN Remote Dashboard v2</title>

    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 60px;
        }
        .panel {
            background: #161b22;
            padding: 25px;
            width: 520px;
            margin: auto;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .info {
            white-space: pre-line;
            margin-top: 15px;
            font-size: 15px;
            color: #8b949e;
        }
        button {
            background: #238636;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            width: 80%;
        }
        button:hover {
            background: #2ea043;
        }
        .locked {
            color: #ff6b6b;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="panel">
    <h1>❄️ WSN Remote Dashboard v2</h1>
    <p class="info" id="session">Loading session…</p>

    <div id="controls" style="display:none;">
        <button onclick="sendCommand('ping')">Send Ping</button>
        <button onclick="sendCommand('status')">Request Status</button>
        <button onclick="sendCommand('scan')">Trigger FileWatcher Scan</button>
        <button onclick="sendCommand('restart')">Restart Bot</button>
    </div>

    <p id="locked" class="locked" style="display:none;">
        🚫 Dashboard locked — invalid or missing bot URL.
    </p>
</div>

<script>
    // Read URL parameters
    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");
    const ts = params.get("ts");
    const auth = params.get("auth");

    // REQUIRED AUTH TOKEN
    const REQUIRED_AUTH = "WSN";

    // Validate URL
    const valid =
        uid !== null &&
        ts !== null &&
        auth === REQUIRED_AUTH;

    // Display session info
    if (valid) {
        document.getElementById("session").innerText =
            `User ID: ${uid}\nTimestamp: ${ts}\nAuth Token: ${auth}\n\nDashboard unlocked.`;
        document.getElementById("controls").style.display = "block";
    } else {
        document.getElementById("session").innerText =
            `User ID: ${uid}\nTimestamp: ${ts}\nAuth Token: ${auth}`;
        document.getElementById("locked").style.display = "block";
    }

    // Backend: send to Discord webhook
    function sendCommand(action) {
        if (!valid) return;

        fetch("https://discord.com/api/webhooks/1489376756430405643/36UL8Qfn4wJ48r0qvlmqwdkMOgKJgiXHM2p6zbk0yunTf2moAPn4WX_dDAcqebEtJN__", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content:
                    `📡 **WSN Dashboard Command**\n` +
                    `Action: ${action}\n` +
                    `UID: ${uid}\nTS: ${ts}\nAuth: ${auth}`
            })
        });
    }
</script>

</body>
</html>
